<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStudy - Maria Clara Mendonça</title>
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    },
                    colors: {
                        primary: '#5A5A40',
                        'primary-dark': '#4a4a35',
                        'bg-main': '#f5f5f0',
                        ink: '#1a1a1a',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <style>
        /* Estilos Customizados */
        @layer base {
            body { @apply bg-bg-main text-ink font-sans; }
        }
        .prose { max-width: none; }
        .prose p { @apply leading-relaxed text-ink/80; }
        .prose h1, .prose h2, .prose h3 { @apply font-serif text-primary; }
        
        #study-content-to-export {
            background-color: #ffffff !important;
            color: #1a1a1a !important;
        }

        /* Esconder scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map para Módulos ESM -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4",
        "react-markdown": "https://esm.sh/react-markdown@8.0.7",
        "@google/genai": "https://esm.sh/@google/genai@1.29.0",
        "jspdf": "https://esm.sh/jspdf@2.5.1",
        "html2canvas": "https://esm.sh/html2canvas@1.4.1",
        "clsx": "https://esm.sh/clsx@2.0.0",
        "tailwind-merge": "https://esm.sh/tailwind-merge@1.14.0"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import ReactDOM from 'react-dom';
        import * as Lucide from 'lucide-react';
        import { motion, AnimatePresence } from 'framer-motion';
        import Markdown from 'react-markdown';
        import { GoogleGenAI, Type } from '@google/genai';
        import { jsPDF } from 'jspdf';
        import html2canvas from 'html2canvas';
        import { clsx } from 'clsx';
        import { twMerge } from 'tailwind-merge';

        // --- Utilitários ---
        function cn(...inputs) {
            return twMerge(clsx(inputs));
        }

        // --- Serviços (IA Gemini) ---
        async function generateStudyContent(topic, imagesBase64, outputType = 'Resumo') {
            // Tenta obter a chave da API do ambiente ou solicita ao usuário
            let apiKey = window.GEMINI_API_KEY || (typeof process !== 'undefined' && process.env.GEMINI_API_KEY) || "";
            
            if (!apiKey) {
                apiKey = prompt("Por favor, insira sua Chave de API do Gemini para continuar:");
                if (!apiKey) throw new Error("API Key é necessária.");
                window.GEMINI_API_KEY = apiKey;
            }

            const ai = new GoogleGenAI({ apiKey });

            if (outputType === 'Imagens') {
                const contents = [];
                if (imagesBase64 && imagesBase64.length > 0) {
                    imagesBase64.forEach(img => {
                        contents.push({ inlineData: { mimeType: "image/png", data: img.split(',')[1] || img } });
                    });
                    contents.push({ text: `Edite estas imagens conforme solicitado: "${topic}". Retorne o diagrama editado.` });
                } else {
                    contents.push({ text: `Gere um diagrama científico sobre: "${topic}". Fundo branco, legendas em PT-BR.` });
                }

                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash-image',
                    contents: { parts: contents },
                    config: { imageConfig: { aspectRatio: "16:9" } }
                });

                const images = [];
                for (const part of response.candidates?.[0]?.content?.parts || []) {
                    if (part.inlineData) images.push(`data:image/png;base64,${part.inlineData.data}`);
                }

                return {
                    summary: images.length > 0 ? "Aqui está o seu diagrama." : "Não foi possível gerar a imagem.",
                    images,
                    quiz: [],
                    type: 'Imagens'
                };
            }

            // Geração de Texto e Simulado
            const contents = [{
                text: `Você é um tutor para Maria Clara Mendonça. Tema: "${topic}". Tipo: ${outputType}.
                Gere: 1. Resumo Markdown. 2. 5 questões de simulado. 3. 2 prompts de imagem em inglês.
                Retorne APENAS um JSON com as chaves: summary, imagePrompts, quiz.`
            }];

            if (imagesBase64 && imagesBase64.length > 0) {
                imagesBase64.forEach(img => {
                    contents.push({ inlineData: { mimeType: "image/png", data: img.split(',')[1] || img } });
                });
            }

            const textResponse = await ai.models.generateContent({
                model: "gemini-3-flash-preview",
                contents: { parts: contents },
                config: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: Type.OBJECT,
                        properties: {
                            summary: { type: Type.STRING },
                            imagePrompts: { type: Type.ARRAY, items: { type: Type.STRING } },
                            quiz: {
                                type: Type.ARRAY,
                                items: {
                                    type: Type.OBJECT,
                                    properties: {
                                        type: { type: Type.STRING },
                                        question: { type: Type.STRING },
                                        options: { type: Type.ARRAY, items: { type: Type.STRING } },
                                        correctAnswer: { type: Type.STRING },
                                        explanation: { type: Type.STRING }
                                    },
                                    required: ["type", "question", "correctAnswer", "explanation"]
                                }
                            }
                        },
                        required: ["summary", "imagePrompts", "quiz"]
                    }
                }
            });

            const data = JSON.parse(textResponse.text || "{}");
            const images = [];

            if (data.imagePrompts && data.imagePrompts.length > 0) {
                const imagePromises = data.imagePrompts.slice(0, 2).map(async (p) => {
                    try {
                        const imgRes = await ai.models.generateContent({
                            model: 'gemini-2.5-flash-image',
                            contents: { parts: [{ text: p }] },
                            config: { imageConfig: { aspectRatio: "16:9" } }
                        });
                        const part = imgRes.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                        return part?.inlineData?.data ? `data:image/png;base64,${part.inlineData.data}` : null;
                    } catch (e) { return null; }
                });
                const results = await Promise.all(imagePromises);
                results.forEach(r => { if (r) images.push(r); });
            }

            return {
                summary: data.summary,
                images,
                quiz: data.quiz || [],
                type: outputType
            };
        }

        // --- Componentes ---

        const WelcomeScreen = ({ onStart }) => (
            <motion.div 
                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-bg-main p-6 text-center"
            >
                <div className="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-primary text-white shadow-lg">
                    <Lucide.GraduationCap size={40} />
                </div>
                <h1 className="font-serif text-4xl font-light text-ink md:text-6xl">
                    Bem-vinda, <span className="italic text-primary">Maria Clara Mendonça</span>
                </h1>
                <p className="mt-4 font-serif text-xl italic text-primary/70">O que você deseja estudar hoje?</p>
                <button
                    onClick={onStart}
                    className="mt-10 flex items-center gap-2 rounded-lg bg-primary px-10 py-5 text-xl font-medium text-white shadow-lg transition-all hover:bg-primary-dark active:scale-95"
                >
                    Começar meus estudos <Lucide.ChevronRight />
                </button>
            </motion.div>
        );

        const QuizModule = ({ questions }) => {
            const [idx, setIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [finished, setFinished] = useState(false);

            const q = questions[idx];
            if (!q) return <div>Sem questões disponíveis.</div>;

            const handleAnswer = (ans) => {
                if (showFeedback) return;
                setAnswers({ ...answers, [idx]: ans });
                setShowFeedback(true);
                if (ans.toLowerCase().trim() === q.correctAnswer.toLowerCase().trim()) setScore(s => s + 1);
            };

            if (finished) return (
                <div className="rounded-xl bg-white p-10 text-center shadow-lg">
                    <Lucide.Trophy className="mx-auto mb-4 text-amber-500" size={64} />
                    <h2 className="font-serif text-3xl text-primary">Simulado Concluído!</h2>
                    <p className="mt-2 text-xl">Você acertou {score} de {questions.length} questões.</p>
                    <button onClick={() => window.location.reload()} className="mt-8 rounded-lg bg-primary px-8 py-3 text-white">Reiniciar</button>
                </div>
            );

            return (
                <div className="rounded-xl bg-white p-8 shadow-md border border-primary/10">
                    <div className="mb-6 flex items-center justify-between">
                        <span className="text-xs font-bold uppercase tracking-widest text-primary/40">Questão {idx + 1} de {questions.length}</span>
                        <div className="h-2 w-32 rounded-full bg-primary/10"><div className="h-full rounded-full bg-primary transition-all" style={{ width: `${((idx + 1) / questions.length) * 100}%` }} /></div>
                    </div>
                    <h3 className="text-xl font-medium leading-relaxed text-ink">{q.question}</h3>
                    <div className="mt-8 space-y-3">
                        {q.type === 'multiple-choice' || q.type === 'true-false' ? (
                            (q.options || ['Verdadeiro', 'Falso']).map((opt, i) => (
                                <button 
                                    key={i} onClick={() => handleAnswer(opt)}
                                    className={cn("w-full rounded-lg border-2 p-4 text-left transition-all", 
                                        showFeedback ? (opt === q.correctAnswer ? "border-green-500 bg-green-50" : (answers[idx] === opt ? "border-red-500 bg-red-50" : "border-primary/10")) : "border-primary/10 hover:border-primary hover:bg-primary/5")}
                                >
                                    {opt}
                                </button>
                            ))
                        ) : (
                            <textarea 
                                disabled={showFeedback}
                                className="w-full rounded-lg border-2 border-primary/10 p-4 focus:border-primary focus:outline-none"
                                placeholder="Sua resposta..."
                                onBlur={(e) => handleAnswer(e.target.value)}
                            />
                        )}
                    </div>
                    {showFeedback && (
                        <div className="mt-6 border-t border-primary/10 pt-6">
                            <div className="rounded-lg bg-bg-main p-4 text-sm text-primary/80"><strong>Explicação:</strong> {q.explanation}</div>
                            <button onClick={() => { setShowFeedback(false); if (idx + 1 < questions.length) setIdx(idx + 1); else setFinished(true); }} className="mt-4 w-full rounded-lg bg-primary py-4 text-white font-bold">Próxima Questão</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- App Principal ---

        function App() {
            const [step, setStep] = useState('welcome');
            const [subStep, setSubStep] = useState('subject');
            const [subject, setSubject] = useState(null);
            const [type, setType] = useState('Resumo');
            const [topic, setTopic] = useState('');
            const [loading, setLoading] = useState(false);
            const [content, setContent] = useState(null);
            const [activeTab, setActiveTab] = useState('summary');
            const [images, setImages] = useState([]);
            const [error, setError] = useState(null);

            const handleSearch = async (e) => {
                if (e) e.preventDefault();
                if (!topic.trim() && images.length === 0) return;
                setLoading(true);
                setStep('study');
                try {
                    const res = await generateStudyContent(`${subject}: ${topic}`, images, type);
                    setContent(res);
                } catch (err) {
                    setError("Erro ao gerar conteúdo. Verifique sua chave de API.");
                    console.error(err);
                } finally { setLoading(false); }
            };

            const downloadPDF = async () => {
                const el = document.getElementById('study-content-to-export');
                const canvas = await html2canvas(el, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF();
                pdf.addImage(imgData, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(`BioStudy-${topic}.pdf`);
            };

            return (
                <div className="min-h-screen">
                    <AnimatePresence mode="wait">
                        {step === 'welcome' && <WelcomeScreen onStart={() => setStep('input')} />}
                        {step === 'input' && (
                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="flex min-h-screen flex-col items-center justify-center p-6">
                                <div className="w-full max-w-2xl text-center">
                                    {subStep === 'subject' ? (
                                        <div className="space-y-8">
                                            <h2 className="font-serif text-3xl text-primary">Escolha a <span className="italic">matéria foco</span>:</h2>
                                            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
                                                {['Biologia Celular', 'Anatomia', 'Embriologia', 'Direitos Humanos', 'Produção de Textos', 'Consulta Geral'].map(s => (
                                                    <button key={s} onClick={() => { setSubject(s); setSubStep('type'); }} className="rounded-xl border-2 border-primary/20 bg-white p-6 text-left hover:border-primary hover:bg-primary hover:text-white transition-all">{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ) : subStep === 'type' ? (
                                        <div className="space-y-8">
                                            <button onClick={() => setSubStep('subject')} className="text-primary/60 hover:text-primary flex items-center gap-2"><Lucide.ArrowLeft size={16}/> Voltar</button>
                                            <h2 className="font-serif text-3xl text-primary">O que deseja <span className="italic">gerar</span>?</h2>
                                            <div className="grid grid-cols-2 gap-4">
                                                {['Resumo', 'Trabalho', 'Lição', 'Imagens'].map(t => (
                                                    <button key={t} onClick={() => { setType(t); setSubStep('details'); }} className="rounded-xl border-2 border-primary/20 bg-white p-8 hover:border-primary hover:bg-primary hover:text-white transition-all font-bold">{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <button onClick={() => setSubStep('type')} className="text-primary/60 hover:text-primary flex items-center gap-2"><Lucide.ArrowLeft size={16}/> Voltar</button>
                                            <h2 className="font-serif text-3xl text-primary">{subject}</h2>
                                            <form onSubmit={handleSearch} className="space-y-6">
                                                <textarea value={topic} onChange={e => setTopic(e.target.value)} placeholder="Descreva o tema aqui..." className="w-full min-h-[150px] rounded-xl border-2 border-primary/30 p-8 text-lg focus:border-primary focus:outline-none shadow-md" />
                                                <button type="submit" className="w-full rounded-xl bg-primary py-5 text-white text-xl font-bold shadow-lg hover:bg-primary-dark transition-all">Gerar Material</button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                            </motion.div>
                        )}
                        {step === 'study' && (
                            <div className="mx-auto max-w-5xl p-6 pb-20">
                                <header className="mb-10 flex items-center justify-between">
                                    <button onClick={() => { setStep('input'); setContent(null); }} className="flex items-center gap-2 text-primary hover:underline"><Lucide.ArrowLeft size={20}/> Novo estudo</button>
                                    {content && <button onClick={downloadPDF} className="flex items-center gap-2 rounded-lg bg-white px-4 py-2 text-primary shadow-sm border border-primary/20 hover:bg-primary/5"><Lucide.Download size={16}/> Baixar PDF</button>}
                                </header>
                                {loading ? (
                                    <div className="flex h-[60vh] flex-col items-center justify-center text-center">
                                        <Lucide.Loader2 className="h-16 w-16 animate-spin text-primary opacity-20" />
                                        <h3 className="mt-8 font-serif text-3xl italic text-primary">Criando mágica para Maria Clara...</h3>
                                    </div>
                                ) : error ? (
                                    <div className="text-center py-20">
                                        <Lucide.XCircle size={48} className="mx-auto text-red-500 mb-4" />
                                        <p className="text-xl text-ink">{error}</p>
                                        <button onClick={() => setStep('input')} className="mt-6 bg-primary text-white px-6 py-2 rounded-lg">Tentar Novamente</button>
                                    </div>
                                ) : content && (
                                    <div className="grid grid-cols-1 gap-8 lg:grid-cols-12">
                                        <aside className="lg:col-span-3 space-y-2">
                                            <button onClick={() => setActiveTab('summary')} className={cn("flex w-full items-center gap-3 rounded-lg px-6 py-4 transition-all", activeTab === 'summary' ? "bg-primary text-white shadow-md" : "bg-white text-primary border border-primary/10")}>
                                                <Lucide.BookOpen size={20} /> Resumo
                                            </button>
                                            <button onClick={() => setActiveTab('quiz')} className={cn("flex w-full items-center gap-3 rounded-lg px-6 py-4 transition-all", activeTab === 'quiz' ? "bg-primary text-white shadow-md" : "bg-white text-primary border border-primary/10")}>
                                                <Lucide.Brain size={20} /> Simulado
                                            </button>
                                        </aside>
                                        <main className="lg:col-span-9">
                                            {activeTab === 'summary' ? (
                                                <div id="study-content-to-export" className="rounded-xl bg-white p-10 shadow-md border border-primary/10">
                                                    <h1 className="font-serif text-3xl text-primary mb-6 border-b pb-4">{type}: {topic}</h1>
                                                    <div className="prose"><Markdown>{content.summary}</Markdown></div>
                                                    {content.images.map((img, i) => (
                                                        <img key={i} src={img} className="mt-8 w-full rounded-lg shadow-lg border border-primary/10" />
                                                    ))}
                                                </div>
                                            ) : <QuizModule questions={content.quiz} />}
                                        </main>
                                    </div>
                                )}
                            </div>
                        )}
                    </AnimatePresence>
                    <footer className="fixed bottom-0 left-0 right-0 py-4 text-center bg-bg-main/80 backdrop-blur-sm">
                        <p className="text-[10px] uppercase tracking-widest text-primary/60 font-bold">Feito para Maria Clara • BioStudy v1.5</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
